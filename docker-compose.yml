version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: intellicircuit-backend
    ports:
      - "5001:5000"
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: intellicircuit-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/circuit_analyzer.html:/usr/share/nginx/html/index.html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped